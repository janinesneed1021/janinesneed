  <style>
    :root {
      --bg: #faf8f4;
      --surface: #ffffff;
      --ink: #1a1814;
      --muted: #7a7570;
      --rule: #e4e0d8;
      --accent: #c0392b;
      --accent-light: rgba(192,57,43,0.06);
      --accent-border: rgba(192,57,43,0.2);
      --serif: 'Libre Baskerville', Georgia, serif;
      --sans: 'Karla', sans-serif;
      --shadow-sm: 0 2px 12px rgba(0,0,0,0.05);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.10);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.14);
      --radius: 2px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 400;
      line-height: 1.65;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 2px solid var(--ink);
      padding: 3rem 4rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 2rem;
      flex-wrap: wrap;
      animation: fadeDown 0.5s ease forwards;
    }

    .header-left h1 {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .header-left p {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 0.4rem;
      font-style: italic;
    }

    .header-right {
      display: flex;
      align-items: flex-end;
      gap: 2.5rem;
    }

    .header-stat {
      font-family: var(--serif);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: right;
      line-height: 1.3;
    }

    .header-stat span {
      display: block;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    /* ── STICKY CONTROLS ── */
    .controls {
      padding: 1rem 4rem;
      border-bottom: 1px solid var(--rule);
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .controls-top {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 380px;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 0.6rem 0.85rem 0.6rem 2.3rem;
      border: 1px solid var(--rule);
      background: var(--bg);
      font-family: var(--sans);
      font-size: 0.85rem;
      color: var(--ink);
      outline: none;
      border-radius: var(--radius);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search:focus {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(26,24,20,0.06);
    }

    #search::placeholder { color: var(--muted); }

    .search-clear {
      position: absolute;
      right: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.2rem;
      display: none;
      line-height: 1;
      font-size: 1rem;
    }

    .search-clear:hover { color: var(--ink); }

    .cat-nav {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .cat-btn {
      padding: 0.3rem 0.75rem;
      border: 1px solid var(--rule);
      background: transparent;
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border-radius: 100px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .cat-btn:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    .cat-btn.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    /* ── MAIN ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 4rem 8rem;
    }

    /* ── SECTION ── */
    .section {
      margin-bottom: 3.5rem;
      animation: fadeUp 0.45s ease both;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 0.85rem;
      margin-bottom: 1rem;
      padding-bottom: 0.65rem;
      border-bottom: 1.5px solid var(--rule);
    }

    .section-title {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .section-count {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── ARTICLE LIST ── */
    .article-list { display: flex; flex-direction: column; }

    .article-item {
      display: flex;
      align-items: center;
      padding: 0.52rem 0.5rem;
      border-bottom: 1px solid var(--rule);
      margin: 0 -0.5rem;
      transition: background 0.12s;
    }

    .article-item:last-child { border-bottom: none; }

    .article-item:hover { background: var(--accent-light); }

    .article-bullet {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      opacity: 0.65;
    }

    .article-link {
      font-size: 0.875rem;
      color: var(--ink);
      text-decoration: none;
      line-height: 1.4;
      flex: 1;
      transition: color 0.12s;
    }

    .article-link:hover { color: var(--accent); }

    .article-source {
      font-size: 0.68rem;
      color: var(--muted);
      flex-shrink: 0;
      white-space: nowrap;
      font-style: italic;
    }

    .article-badge {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 100px;
      padding: 0.1rem 0.45rem;
      flex-shrink: 0;
      opacity: 0.85;
    }

    /* ── NO RESULTS ── */
    #no-results {
      display: none;
      text-align: center;
      padding: 6rem 0;
      color: var(--muted);
    }

    #no-results p {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.1rem;
    }

    #no-results small {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.8rem;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 2px solid var(--ink);
      padding: 1.5rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .section:nth-child(odd)  { animation-delay: 0.03s; }
    .section:nth-child(even) { animation-delay: 0.07s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      header, .controls, main, footer {
        padding-left: 1.25rem;
        padding-right: 1.25rem;
      }
      header { padding-top: 2rem; padding-bottom: 1.25rem; }
      .article-source { display: none; }
      .fab { bottom: 1.25rem; right: 1.25rem; padding: 0.7rem 1.1rem; }
    }
  </style>
</head>

// ─── BUILD DATA ──────────────────────────────────────────────────────
function buildMergedData() {
  const merged = staticData.map(section => ({
    cat: section.cat,
    articles: section.articles.map(a => ({ ...a, cat: section.cat }))
  }));
  merged.sort((a, b) => a.cat.localeCompare(b.cat));
  return merged;
}

// ─── RENDER ──────────────────────────────────────────────────────────
let mergedData = buildMergedData();

function getSourceFromUrl(url) {
  try {
    return new URL(url).hostname.replace('www.', '');
  } catch { return ''; }
}

function buildPage() {
  const mainEl = document.getElementById('main');
  const nav = document.getElementById('cat-nav');
  let totalCount = 0;

  // Clear existing sections (keep no-results div)
  const noResults = document.getElementById('no-results');
  mainEl.innerHTML = '';
  mainEl.appendChild(noResults);

  // Clear nav (keep All button)
  while (nav.children.length > 1) nav.removeChild(nav.lastChild);

  mergedData.forEach(section => {
    totalCount += section.articles.length;

    // Nav pill
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = section.cat;
    btn.textContent = section.cat;
    nav.appendChild(btn);

    // Section wrapper
    const el = document.createElement('div');
    el.className = 'section';
    el.dataset.cat = section.cat;

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `
      <h2 class="section-title">${section.cat}</h2>
      <span class="section-count" id="count-${section.cat.replace(/\s/g,'-')}">${section.articles.length} article${section.articles.length !== 1 ? 's' : ''}</span>
    `;
    el.appendChild(hdr);

    const list = document.createElement('div');
    list.className = 'article-list';
    list.id = `list-${section.cat.replace(/\s/g,'-')}`;

    section.articles.forEach(article => {
      list.appendChild(makeArticleItem(article));
    });

    el.appendChild(list);
    mainEl.appendChild(el);
  });

  document.getElementById('total-count').textContent = totalCount;
  document.getElementById('cat-count').textContent = mergedData.length;
  updateShowingCount();
}

function makeArticleItem(article) {
  const item = document.createElement('div');
  item.className = 'article-item';
  item.dataset.title = article.title.toLowerCase();

  const src = article.source || getSourceFromUrl(article.url);

  const main = document.createElement('div');
  main.className = 'article-main';
  main.innerHTML = `
    <div class="article-bullet"></div>
    <a class="article-link" href="${article.url}" target="_blank" rel="noopener noreferrer">${article.title}</a>
    ${src ? `<span class="article-source">${src}</span>` : ''}
  `;

  item.appendChild(main);
  return item;
}


function updateShowingCount() {
  const visible = document.querySelectorAll('.article-item:not([style*="display: none"])').length;
  document.getElementById('showing-count').textContent = `Showing ${visible} article${visible !== 1 ? 's' : ''}`;
}

// ─── FILTERING ───────────────────────────────────────────────────────
let currentCat = 'all';
let currentSearch = '';

function applyFilters() {
  const sections = document.querySelectorAll('.section');
  let anyVisible = false;

  sections.forEach(section => {
    const cat = section.dataset.cat;
    const catMatch = currentCat === 'all' || cat === currentCat;
    if (!catMatch) { section.style.display = 'none'; return; }

    const items = section.querySelectorAll('.article-item');
    let sectionHasVisible = false;

    items.forEach(item => {
      const match = !currentSearch || item.dataset.title.includes(currentSearch);
      item.style.display = match ? '' : 'none';
      if (match) sectionHasVisible = true;
    });

    section.style.display = sectionHasVisible ? '' : 'none';
    if (sectionHasVisible) anyVisible = true;
  });

  document.getElementById('no-results').style.display = anyVisible ? 'none' : 'block';
  updateShowingCount();
}

// Category nav
document.getElementById('cat-nav').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  applyFilters();
  document.querySelector('.controls').scrollIntoView({ behavior: 'smooth' });
});

// Search
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', e => {
  currentSearch = e.target.value.toLowerCase().trim();
  searchClear.style.display = currentSearch ? 'block' : 'none';

  if (currentSearch) {
    currentCat = 'all';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.cat-btn[data-cat="all"]').classList.add('active');
  }
  applyFilters();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  currentSearch = '';
  searchClear.style.display = 'none';
  applyFilters();
  searchInput.focus();
});


// ─── INIT ─────────────────────────────────────────────────────────────
buildPage();
</script>
